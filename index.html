<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Growth Log">
<meta name="theme-color" content="#ffffff">
<title>Growth Log</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #ffffff;
  color: #4a4a4a;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
}

.main-content {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  align-items: start;
}

@media (max-width: 900px) {
  .main-content {
    grid-template-columns: 1fr;
  }
}

h1 {
  text-align: center;
  color: #7c6f9c;
  font-size: 1.6rem;
  margin-bottom: 8px;
  font-weight: 600;
}

.date-display {
  text-align: center;
  color: #a0a0a0;
  font-size: 0.9rem;
  margin-bottom: 24px;
}

/* Login Screen */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 24px;
}

.login-screen h1 {
  font-size: 2rem;
  margin-bottom: 0;
}

.login-subtitle {
  color: #a0a0a0;
  font-size: 0.95rem;
}

.btn-google-login {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 32px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(196, 136, 136, 0.3);
}

.btn-google-login:hover {
  background: #B07A84;
  box-shadow: 0 4px 12px rgba(176, 112, 112, 0.4);
}

.btn-google-login svg {
  width: 20px;
  height: 20px;
}

.password-wrapper {
  position: relative;
  width: 100%;
}

.password-wrapper input {
  width: 100%;
  padding-right: 40px;
}

.password-toggle {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #bbb;
  font-size: 1rem;
  padding: 4px;
  display: flex;
  align-items: center;
}

.password-toggle:hover {
  color: #888;
}

.login-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 340px;
}

.login-divider-line {
  flex: 1;
  height: 1px;
  background: #e0dff0;
}

.login-divider-text {
  color: #bbb;
  font-size: 0.85rem;
  white-space: nowrap;
}

.email-login-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}

.email-login-form input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e0dff0;
  border-radius: 10px;
  font-size: 0.95rem;
  color: #4a4a4a;
  outline: none;
  transition: border 0.2s;
  background: #fff;
}

.email-login-form input:focus {
  border-color: #C58D98;
}

.email-login-buttons {
  display: flex;
  gap: 10px;
}

.btn-email-login,
.btn-email-register {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}

.btn-email-login {
  background: #C58D98;
  color: #fff;
  box-shadow: 0 2px 8px rgba(196, 136, 136, 0.3);
}

.btn-email-login:hover {
  background: #B07A84;
  box-shadow: 0 4px 12px rgba(176, 112, 112, 0.4);
}

.btn-email-register {
  background: #f0eef5;
  color: #7c6f9c;
}

.btn-email-register:hover {
  background: #e4e0f0;
}

.email-login-error {
  color: #c44;
  font-size: 0.8rem;
  text-align: center;
  min-height: 1.2em;
}

.login-note {
  color: #ccc;
  font-size: 0.75rem;
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
}

/* Logout Button */
.logout-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  flex-wrap: nowrap;
  white-space: nowrap;
}

.user-email {
  font-size: 0.75rem;
  color: #bbb;
}

.btn-logout {
  padding: 5px 14px;
  background: #eee;
  color: #888;
  border: none;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.btn-logout:hover {
  background: #ddd;
  color: #666;
}

.btn-mypage {
  padding: 5px 14px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-mypage:hover {
  background: #B07A84;
}

/* My Page Modal */
.mypage-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

.mypage-overlay.active {
  display: flex;
}

.mypage-modal {
  background: #fff;
  border-radius: 16px;
  padding: 32px;
  width: 400px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.mypage-modal h2 {
  font-size: 1.1rem;
  color: #7c6f9c;
  margin-bottom: 20px;
  font-weight: 600;
}

.mypage-field {
  margin-bottom: 16px;
}

.mypage-field label {
  display: block;
  font-size: 0.8rem;
  color: #999;
  margin-bottom: 6px;
}

.mypage-field input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #c0c0c8;
  border-radius: 8px;
  font-size: 0.95rem;
  color: #4a4a4a;
  outline: none;
}

.mypage-field input:focus {
  border-color: #C58D98;
}

.mypage-info {
  font-size: 0.8rem;
  color: #bbb;
  margin-bottom: 6px;
}

.mypage-buttons {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

.mypage-btn-save {
  padding: 8px 24px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 600;
}

.mypage-btn-save:hover {
  background: #B07A84;
}

.mypage-btn-cancel {
  padding: 8px 24px;
  background: #eee;
  color: #888;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
}

.mypage-btn-cancel:hover {
  background: #ddd;
}

/* Sync indicator */
.sync-indicator {
  font-size: 0.7rem;
  color: #bbb;
  padding: 2px 8px;
  border-radius: 4px;
}

.sync-indicator.syncing {
  color: #C58D98;
}

.sync-indicator.error {
  color: #e07070;
}

.lang-toggle {
  padding: 5px 14px;
  background: #f5f5f5;
  color: #888;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  outline: none;
  transition: all 0.2s;
  white-space: nowrap;
}

.lang-toggle:hover {
  background: #eee;
  border-color: #ccc;
}

/* Date Navigation */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}

.date-nav-btn {
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 8px;
  width: 36px;
  height: 36px;
  font-size: 1.1rem;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.date-nav-btn:hover {
  background: #b07575;
}

.date-nav-btn:disabled {
  background: #e0d0d0;
  cursor: not-allowed;
}

.date-nav-label {
  font-size: 1rem;
  color: #5a5a5a;
  font-weight: 600;
  min-width: 180px;
  text-align: center;
}

.date-nav-today {
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
}

.date-nav-today:hover {
  background: #b07575;
}

.readonly-banner {
  text-align: center;
  background: #f5f0f0;
  border: 1px solid #e8dede;
  border-radius: 8px;
  padding: 8px 16px;
  margin-bottom: 16px;
  font-size: 0.85rem;
  color: #999;
}

/* Summary Cards */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.summary-card {
  background: #fef6f0;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  border: 1px solid #fde8d8;
}

.summary-card:nth-child(2) {
  background: #f0f4fe;
  border-color: #d8e2fd;
}

.summary-card:nth-child(3) {
  background: #f0fef4;
  border-color: #d8fde2;
}

.summary-label {
  font-size: 0.75rem;
  color: #999;
  margin-bottom: 4px;
}

.summary-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: #5a5a5a;
}

.btn-goal {
  padding: 5px 14px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
  font-weight: 600;
}

.btn-goal:hover {
  background: #B07A84;
}

.summary-hint {
  font-size: 0.65rem;
  color: #bbb;
  margin-top: 6px;
}

.summary-card.clickable {
  cursor: pointer;
  transition: box-shadow 0.2s;
}

.summary-card.clickable:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Goal Progress Bar */
.goal-bar-container {
  margin-top: 8px;
}

.goal-label {
  font-size: 0.7rem;
  color: #aaa;
  margin-bottom: 3px;
}

.goal-bar-bg {
  background: #e8e0e0;
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
}

.goal-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.4s ease;
}

.goal-bar-fill.study {
  background: #9dd4a8;
}

.goal-bar-fill.dev {
  background: #9db8d4;
}

/* Goal Input Modal */
.goal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.goal-modal {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  min-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.goal-modal-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #5a5a5a;
  margin-bottom: 16px;
}

.goal-modal-row {
  display: flex;
  gap: 10px;
  align-items: end;
  margin-bottom: 16px;
}

.goal-modal-row .field {
  flex: 1;
}

.goal-modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Input Row */
.input-row {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
  align-items: stretch;
}

/* Input Form */
.input-section {
  background: #fafaff;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid #ececf5;
  flex: 1;
}

.input-section h2 {
  font-size: 1rem;
  color: #7c6f9c;
  margin-bottom: 14px;
  font-weight: 600;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 2fr 60px 60px 80px;
  gap: 10px;
  align-items: end;
}

label {
  display: block;
  font-size: 0.75rem;
  color: #999;
  margin-bottom: 4px;
}

input, select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid #c0c0c8;
  border-radius: 8px;
  font-size: 0.9rem;
  background: #fff;
  color: #4a4a4a;
  outline: none;
  transition: border 0.2s;
  font-weight: 600;
}

input:focus, select:focus {
  border-color: #b8b0d4;
}

.btn-add {
  padding: 10px 16px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
  height: 40px;
}

.btn-add:hover {
  background: #b07575;
}

/* Project Management */
.project-manager {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: end;
}

.project-manager .field { flex: 1; }

.btn-project {
  padding: 10px 14px;
  background: #C58D98;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
  height: 40px;
}

.btn-project:hover {
  background: #b07575;
}

/* Task Grid */
#taskDisplay {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.project-group {
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid #b0b0ba;
  display: flex;
  flex-direction: column;
}

.project-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  font-weight: 600;
  font-size: 0.9rem;
  color: #fff;
}

.project-time {
  font-size: 0.75rem;
  font-weight: 400;
  opacity: 0.9;
}

.task-list {
  flex: 1;
  background: #fff;
}

.task-item {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  background: #fff;
  border-bottom: 1px solid #f5f5fa;
  transition: background 0.15s;
  flex-wrap: wrap;
}

.task-item:last-child {
  border-bottom: none;
}

.task-item:hover {
  background: #fafaff;
}

.task-name {
  flex: 1;
  font-size: 0.85rem;
  min-width: 0;
  word-break: break-word;
}

.task-time {
  font-size: 0.8rem;
  color: #7c6f9c;
  font-weight: 600;
  margin-left: 8px;
  white-space: nowrap;
}

.editable {
  cursor: pointer;
  border-radius: 4px;
  padding: 2px 4px;
  transition: background 0.15s;
}

.editable:hover {
  background: #f0eef8;
}

.edit-input {
  font-size: 0.9rem;
  padding: 4px 8px;
  border: 1px solid #b8b0d4;
  border-radius: 6px;
  outline: none;
  background: #fff;
  color: #4a4a4a;
}

.edit-input.time {
  width: 70px;
  text-align: right;
}

.btn-delete {
  background: none;
  border: none;
  color: #dbb;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px 8px;
  border-radius: 6px;
  transition: all 0.2s;
}

.btn-delete:hover {
  background: #fee;
  color: #c88;
}

/* Advice Section */
.advice-section {
  margin-top: 24px;
}

.advice-section h2 {
  font-size: 1rem;
  color: #7c6f9c;
  margin-bottom: 12px;
  font-weight: 600;
}

.advice-card {
  background: #fff9f0;
  border: 1px solid #fde8d0;
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 10px;
  font-size: 0.85rem;
  line-height: 1.6;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.advice-icon {
  font-size: 1.2rem;
  flex-shrink: 0;
  margin-top: 2px;
}

.advice-card.warning {
  background: #fff5f5;
  border-color: #fdd8d8;
}

.advice-card.good {
  background: #f0fef4;
  border-color: #d0f0dd;
}

.advice-card.info {
  background: #f0f4fe;
  border-color: #d0ddfe;
}

/* Weekly Report */
.weekly-report {
  margin-top: 24px;
}

.weekly-report h2 {
  font-size: 1rem;
  color: #7c6f9c;
  margin-bottom: 12px;
  font-weight: 600;
}

.weekly-report-container {
  background: #fafaff;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid #ececf5;
}

.weekly-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.weekly-bar-label {
  font-size: 0.75rem;
  color: #999;
  width: 80px;
  text-align: right;
  flex-shrink: 0;
}

.weekly-bar-bg {
  flex: 1;
  background: #ececf5;
  border-radius: 6px;
  height: 20px;
  overflow: hidden;
}

.weekly-bar-fill {
  height: 100%;
  border-radius: 6px;
  background: #c4b8e0;
  transition: width 0.4s ease;
  min-width: 0;
}

.weekly-bar-value {
  font-size: 0.75rem;
  color: #5a5a5a;
  font-weight: 600;
  width: 60px;
  flex-shrink: 0;
}

.weekly-bar-row.today .weekly-bar-fill {
  background: #C58D98;
}

.weekly-summary {
  display: flex;
  gap: 24px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #ececf5;
}

.weekly-summary-item {
  text-align: center;
}

.weekly-summary-label {
  font-size: 0.7rem;
  color: #aaa;
  margin-bottom: 2px;
}

.weekly-summary-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: #5a5a5a;
}

/* Timeline */
.timeline-section {
  margin-top: 24px;
}

.timeline-section h2 {
  font-size: 1rem;
  color: #7c6f9c;
  margin-bottom: 12px;
  font-weight: 600;
}

.donut-container {
  background: #f8f8fd;
  border-radius: 16px;
  padding: 24px;
  border: 1px solid #ececf5;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.timeline-section {
  position: sticky;
  top: 20px;
}

.donut-chart {
  position: relative;
  flex-shrink: 0;
}

.donut-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.donut-total-label {
  font-size: 0.7rem;
  color: #aaa;
}

.donut-total-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: #5a5a5a;
}

.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.donut-legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.donut-legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 4px;
  flex-shrink: 0;
}

.donut-legend-info {
  display: flex;
  flex-direction: column;
}

.donut-legend-name {
  font-size: 0.85rem;
  color: #5a5a5a;
  font-weight: 600;
}

.donut-legend-detail {
  font-size: 0.75rem;
  color: #aaa;
}


/* Color Picker Modal */
.color-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.color-modal {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  min-width: 280px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.color-modal-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #5a5a5a;
  margin-bottom: 16px;
}

.color-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.color-swatch {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}

.color-swatch:hover {
  transform: scale(1.15);
}

.color-swatch.selected {
  border-color: #4a4a4a;
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px #4a4a4a;

.custom-select {
  position: relative;

.custom-select-trigger {
  width: 100%;
  padding: 10px 12px;

  border: 1.5px solid #c0c0c8;
  border-radius: 8px;

.custom-select-trigger::after {
  content: '';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%) rotate(0deg);
  width: 0;
  height: 0;
  border-left: 5px solid transparent;

function t(key) {
  return TRANSLATIONS[currentLang][key] || TRANSLATIONS['ja'][key] || key;
}

function toggleLanguage() {
  changeLanguage(currentLang === 'ja' ? 'en' : 'ja');
}

function updateLangToggleButtons() {
  const label = currentLang === 'ja' ? '日本語' : 'English';
  const btn1 = document.getElementById('langToggle');
  const btn2 = document.getElementById('langToggleLogin');
  if (btn1) btn1.textContent = label;
  if (btn2) btn2.textContent = label;
}

function changeLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('daily-task-tracker-lang', lang);
  document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  // Save to Firestore
  if (currentUser) {
    const profileData = { ...userProfile, lang: lang };
    saveProfileToFirestore(profileData);
  }
  updateLangToggleButtons();
  // Update all static text
  updateStaticText();
  // Re-render dynamic content
  updateTitle();
  if (data) render();
  if (timerState !== 'running') renderTimer();
}

function resetPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) {
    showEmailError(currentLang === 'ja' ? 'メールアドレスを入力してからクリックしてください' : 'Enter your email first');
    return;
  }
  auth.sendPasswordResetEmail(email).then(() => {
    showEmailError(currentLang === 'ja' ? 'パスワードリセットメールを送信しました。メールを確認してください' : 'Password reset email sent. Check your inbox');
  }).catch(err => {
    console.error('Password reset error:', err);
    showEmailError(currentLang === 'ja' ? 'メール送信に失敗しました。メールアドレスを確認してください' : 'Failed to send. Check your email address');
  });
}

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
    return auth.signInWithPopup(provider);
  }).catch(err => {
    console.error('Login error:', err);
    alert(t('loginFailed'));
  });
}

function getEmailAuthErrorMessage(errorCode) {
  switch (errorCode) {
    case 'auth/wrong-password':
    case 'auth/invalid-credential':
      return t('errorWrongPassword');
    case 'auth/user-not-found':
      return t('errorUserNotFound');
    case 'auth/email-already-in-use':
      return t('errorEmailInUse');
    case 'auth/weak-password':
      return t('errorWeakPassword');
    case 'auth/invalid-email':
      return t('errorInvalidEmail');
    default:
      return t('loginFailed');
  }
}

function showEmailError(msg) {
  const el = document.getElementById('emailLoginError');
  if (el) el.textContent = msg;
}

function clearEmailError() {
  const el = document.getElementById('emailLoginError');
  if (el) el.textContent = '';
}

function emailLogin() {
  clearEmailError();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email) { showEmailError(t('errorEnterEmail')); return; }
  if (!password) { showEmailError(t('errorEnterPassword')); return; }

  auth.signInWithEmailAndPassword(email, password)
    .catch(err => {
      console.error('Email login error:', err);
      showEmailError(getEmailAuthErrorMessage(err.code));
    });
}

function emailRegister() {
  clearEmailError();
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email) { showEmailError(t('errorEnterEmail')); return; }
  if (!password) { showEmailError(t('errorEnterPassword')); return; }

  auth.createUserWithEmailAndPassword(email, password)
    .catch(err => {
      console.error('Email register error:', err);
      showEmailError(getEmailAuthErrorMessage(err.code));
    });
}

function logout() {
  auth.signOut().catch(err => {
    console.error('Logout error:', err);
  });
}

function setSyncStatus(status) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  if (status === 'syncing') {
    el.textContent = t('syncing');
    el.className = 'sync-indicator syncing';
  } else if (status === 'done') {
    el.textContent = t('syncDone');
    el.className = 'sync-indicator';
    const doneText = t('syncDone');
    setTimeout(() => { if (el.textContent === doneText) el.textContent = ''; }, 2000);
  } else if (status === 'error') {
    el.textContent = t('syncError');
    el.className = 'sync-indicator error';
  } else {
    el.textContent = '';
    el.className = 'sync-indicator';
  }
}

const COLORS = ['#c4b8e0','#b8d4c4','#d4b8c4','#b8c8d4','#d4ccb8','#b8d4d4','#d4b8b8','#c4d4b8'];
const STORAGE_KEY = 'daily-task-tracker';
const GOALS_KEY = 'daily-task-tracker-goals';

let viewingDate = todayKey();
let allData = { days: {} };
let data = { projects: [], tasks: [], projectColors: {} };
let goals = { study: 0, dev: 0 };
let userProfile = { displayName: '' };

// Timer state
let timerState = 'idle';
let timerProject = '';
let timerStart = null;
let timerInterval = null;
let timerElapsed = 0;

// ============================================================
// App Initialization (called after login)
// ============================================================

async function initApp() {
  // Step 1: Load from localStorage and display instantly
  allData = loadAllDataFromLocal();
  goals = loadGoalsFromLocal();
  const localProfile = localStorage.getItem('daily-task-tracker-profile');
  if (localProfile) userProfile = JSON.parse(localProfile);
  if (userProfile.lang) currentLang = userProfile.lang;

  updateLangToggleButtons();
  document.documentElement.lang = currentLang === 'ja' ? 'ja' : 'en';
  updateStaticText();
  updateTitle();
  data = getDayData(viewingDate);
  render();
  renderTimer();

  // Step 2: Sync with Firestore in background
  syncWithFirestore();
}

async function syncWithFirestore() {
  try {
    const firestoreDays = await loadAllDaysFromFirestore();
    if (firestoreDays) {
      Object.keys(firestoreDays).forEach(dateKey => {
        allData.days[dateKey] = firestoreDays[dateKey];
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    } else {
      for (const dateKey of Object.keys(allData.days)) {
        await saveDayToFirestore(dateKey, allData.days[dateKey]);
      }
    }

    const firestoreGoals = await loadGoalsFromFirestore();
    if (firestoreGoals) {
      goals = firestoreGoals;
      localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
    } else if (goals.study || goals.dev) {
      await saveGoalsToFirestore(goals);
    }

    const firestoreProfile = await loadProfileFromFirestore();
    if (firestoreProfile) {
      userProfile = firestoreProfile;
      localStorage.setItem('daily-task-tracker-profile', JSON.stringify(userProfile));
      if (firestoreProfile.lang) {
        currentLang = firestoreProfile.lang;
        localStorage.setItem('daily-task-tracker-lang', currentLang);
        updateLangToggleButtons();
      }
      updateTitle();
    } else if (userProfile.displayName) {
      await saveProfileToFirestore(userProfile);
    }

    // Re-render with synced data
    data = getDayData(viewingDate);
    render();
  } catch (err) {
    console.error('Background sync error:', err);
  }
}

// ============================================================
// LocalStorage (fallback/cache)
// ============================================================

function loadAllDataFromLocal() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return { days: {} };
  const parsed = JSON.parse(saved);
  // Migrate old format
  if (parsed.date && parsed.projects && !parsed.days) {
    const migrated = { days: {} };
    migrated.days[parsed.date] = {
      projects: parsed.projects,
      tasks: parsed.tasks,
      projectColors: parsed.projectColors || {}
    };
    return migrated;
  }
  if (!parsed.days) return { days: {} };
  return parsed;
}

function loadGoalsFromLocal() {
  const saved = localStorage.getItem(GOALS_KEY);
  if (saved) return JSON.parse(saved);
  return { study: 0, dev: 0 };
}

// ============================================================
// Core Functions
// ============================================================

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateKeyToDate(key) {
  const parts = key.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function formatDateKey(key) {
  const d = dateKeyToDate(key);
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
  return d.toLocaleDateString(t('dateLocale'), options);
}

function addDays(dateKey, days) {
  const d = dateKeyToDate(dateKey);
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday() {
  return viewingDate === todayKey();
}

function getDayData(dateKey) {
  if (!allData.days[dateKey]) {
    allData.days[dateKey] = { projects: [], tasks: [], projectColors: {} };
  }
  // Inherit projects from previous day if current day has no projects
  if (!allData.days[dateKey].projects || allData.days[dateKey].projects.length === 0) {
    const prev = getPreviousDayProjects(dateKey);
    if (prev.projects.length > 0) {
      allData.days[dateKey].projects = prev.projects;
      allData.days[dateKey].projectColors = prev.colors;
    }
  }
  if (!allData.days[dateKey].projectColors) allData.days[dateKey].projectColors = {};
  return allData.days[dateKey];
}

function getPreviousDayProjects(dateKey) {
  const sortedDays = Object.keys(allData.days)
    .filter(d => d < dateKey && allData.days[d].projects && allData.days[d].projects.length > 0)
    .sort()
    .reverse();
  if (sortedDays.length > 0) {
    const prev = allData.days[sortedDays[0]];
    return {
      projects: [...prev.projects],
      colors: prev.projectColors ? { ...prev.projectColors } : {}
    };
  }
  return { projects: [], colors: {} };
}

function saveData() {
  allData.days[viewingDate] = data;
  // Save to localStorage (cache)
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  // Save to Firestore (async, non-blocking)
  saveDayToFirestore(viewingDate, data);
}

function saveGoals() {
  localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
  saveGoalsToFirestore(goals);
}

// Date navigation
async function navigateDay(offset) {
  const newDate = addDays(viewingDate, offset);
  if (newDate > todayKey()) return;
  viewingDate = newDate;

  // Try loading from Firestore if not in local cache
  if (!allData.days[viewingDate] || (allData.days[viewingDate].tasks && allData.days[viewingDate].tasks.length === 0)) {
    const firestoreDay = await loadDayFromFirestore(viewingDate);
    if (firestoreDay) {
      allData.days[viewingDate] = firestoreDay;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    }
  }

  data = getDayData(viewingDate);
  render();
  if (isToday() && timerState === 'idle') renderTimer();
}

async function goToToday() {
  viewingDate = todayKey();

  // Refresh today's data from Firestore
  const firestoreDay = await loadDayFromFirestore(viewingDate);
  if (firestoreDay) {
    allData.days[viewingDate] = firestoreDay;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  }

  data = getDayData(viewingDate);
  render();
  if (timerState === 'idle') renderTimer();
}

function saveGoalFromModal(type) {

function renderTimer() {
  const container = document.getElementById('timerContent');
  if (timerState === 'idle') {
    let html = '<div class="timer-idle">';
    html += `<div class="field"><label>${t('labelSelectProject')}</label><div id="timerProjectContainer"></div></div>`;
    html += `<button class="btn-start" onclick="startTimer()">${t('btnStart')}</button>`;
    html += '</div>';
    container.innerHTML = html;
    createCustomSelect('timerProjectContainer', data.projects, t('selectDefault'));
  } else if (timerState === 'running') {
    let html = '<div class="timer-running">';
    html += `<div class="timer-project-name">${escapeHtml(timerProject)}${t('timerWorking')}</div>`;
    html += `<div class="timer-display timer-pulse" id="timerDisplay">${formatElapsed(timerElapsed)}</div>`;
    html += `<button class="btn-stop" onclick="stopTimer()">${t('btnStop')}</button>`;
    html += '</div>';
    container.innerHTML = html;
  } else if (timerState === 'result') {
    const mins = Math.max(1, Math.round(timerElapsed / 60));
    let html = '<div class="timer-result">';
    html += `<div class="timer-result-time">${escapeHtml(timerProject)}：${formatTime(mins)}</div>`;
    html += '<div class="timer-result-row">';
    html += `<input type="text" id="timerTaskName" placeholder="${t('placeholderTask')}" class="edit-input" style="flex:1;">`;
    html += `<button class="btn-add" onclick="saveTimerTask(${mins})">${t('btnAdd')}</button>`;
    html += `<button class="btn-cancel" onclick="resetTimer()">${t('btnCancel')}</button>`;
    html += '</div></div>';
    container.innerHTML = html;
  }
}

function formatElapsed(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer() {
  const project = getCustomSelectValue('timerProjectContainer');
  if (!project) { alert(t('alertSelectProject')); return; }
  timerProject = project;
  timerStart = Date.now();
  timerElapsed = 0;
  timerState = 'running';
  renderTimer();
  timerInterval = setInterval(() => {
    timerElapsed = Math.floor((Date.now() - timerStart) / 1000);
    const display = document.getElementById('timerDisplay');
    if (display) display.textContent = formatElapsed(timerElapsed);
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerElapsed = Math.floor((Date.now() - timerStart) / 1000);
  timerState = 'result';
  renderTimer();
}

function saveTimerTask(mins) {
  const name = document.getElementById('timerTaskName').value.trim();
  if (!name) { alert(t('alertWriteTask')); return; }
  // Always save timer tasks to today
  const todayData = getDayData(todayKey());
  todayData.tasks.push({ project: timerProject, name, time: mins, id: Date.now() });
  allData.days[todayKey()] = todayData;
  if (isToday()) data = todayData;
  saveData();
  // Also save today's data specifically if viewing a different day
  if (!isToday()) {
    saveDayToFirestore(todayKey(), todayData);
  }
  resetTimer();
  render();
}

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerState = 'idle';
  timerProject = '';
  timerStart = null;
  timerElapsed = 0;
  renderTimer();
}

function getProjectColor(project) {
  if (data.projectColors && data.projectColors[project]) {
    return data.projectColors[project];
  }
  const idx = data.projects.indexOf(project);
  return COLORS[idx % COLORS.length];
}

function formatTime(minutes) {
  const tr = TRANSLATIONS[currentLang];
  if (minutes < 60) return tr.formatMinutes(minutes);
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return m > 0 ? tr.formatHoursMinutes(h, m) : tr.formatHours(h);
}

function addProject() {

  const name = input.value.trim();
  if (!name) return;
  if (data.projects.includes(name)) {
    alert(t('alertProjectExists'));
    return;
  }
  data.projects.push(name);
  saveData();
  input.value = '';
  render();
}

function addTask() {
  const project = getCustomSelectValue('taskProjectContainer');
  const name = document.getElementById('taskName').value.trim();
  const hoursVal = document.getElementById('taskHours').value;
  const minutesVal = document.getElementById('taskMinutes').value;
  const hours = hoursVal === '' ? 0 : parseInt(hoursVal);
  const minutes = minutesVal === '' ? 0 : parseInt(minutesVal);
  const time = (isNaN(hours) ? 0 : hours) * 60 + (isNaN(minutes) ? 0 : minutes);

  if (!project) { alert(t('alertSelectProject')); return; }
  if (!name) { alert(t('alertWriteTask')); return; }
  if (time < 1) { alert(t('alertMinTime')); return; }

  data.tasks.push({ project, name, time, id: Date.now() });
  saveData();

  document.getElementById('taskName').value = '';
  document.getElementById('taskHours').value = '';
  document.getElementById('taskMinutes').value = '';
  render();
}

function deleteTask(id) {
  data.tasks = data.tasks.filter(t => t.id !== id);
  saveData();
  render();
}

function generateAdvice() {
  const advices = [];
  const projectTimes = {};

  data.tasks.forEach(t => {
    projectTimes[t.project] = (projectTimes[t.project] || 0) + t.time;
  });

  const totalMinutes = data.tasks.reduce((s, t) => s + t.time, 0);

  // Goal reached messages
  const studyMinutes = data.tasks
    .filter(t => t.project.includes('勉強'))
    .reduce((s, t) => s + t.time, 0);
  const devMinutes = data.tasks
    .filter(t => t.project.includes('開発'))
    .reduce((s, t) => s + t.time, 0);

  const tr = TRANSLATIONS[currentLang];

  if (goals.study > 0 && studyMinutes >= goals.study) {
    advices.push({
      type: 'good',
      icon: '🎉',
      text: tr.adviceGoalStudy(formatTime(goals.study))
    });
  }
  if (goals.dev > 0 && devMinutes >= goals.dev) {
    advices.push({
      type: 'good',
      icon: '🎉',
      text: tr.adviceGoalDev(formatTime(goals.dev))
    });
  }

  // Per-task advice
  data.tasks.forEach(task => {
    if (task.time >= 120) {
      advices.push({
        type: 'warning',
        icon: '⏰',
        text: tr.adviceLongTask(task.name, task.project, formatTime(task.time))
      });
    } else if (task.time >= 60) {
      advices.push({
        type: 'info',
        icon: '💡',
        text: tr.adviceMediumTask(task.name, task.project, formatTime(task.time))
      });
    }
  });

  // Project-level advice
  Object.entries(projectTimes).forEach(([project, time]) => {
    if (time > 240) {
      advices.push({
        type: 'warning',
        icon: '🔥',
        text: tr.adviceOverwork(project, formatTime(time))
      });
    }
    const ratio = totalMinutes > 0 ? (time / totalMinutes * 100) : 0;
    if (ratio > 70 && Object.keys(projectTimes).length > 1) {
      advices.push({
        type: 'info',
        icon: '⚖️',
        text: tr.adviceBalance(project, Math.round(ratio))
      });
    }
  });

  // General advice
  if (totalMinutes > 480) {
    advices.push({
      type: 'warning',
      icon: '😴',
      text: tr.adviceTooLong(formatTime(totalMinutes))
    });
  }

  if (data.tasks.length > 0 && totalMinutes > 0) {
    const avg = Math.round(totalMinutes / data.tasks.length);
    if (avg < 15) {
      advices.push({
        type: 'info',
        icon: '🔍',
        text: tr.adviceShortAvg(avg)
      });
    }
  }

  if (data.tasks.length >= 3 && advices.length === 0) {
    advices.push({
      type: 'good',
      icon: '✨',
      text: tr.adviceGoodBalance
    });
  }

  return advices;
}

function getDayTotalMinutes(dateKey) {
  const dayData = allData.days[dateKey];
  if (!dayData || !dayData.tasks) return 0;
  return dayData.tasks.reduce((s, t) => s + t.time, 0);
}

function renderAiSummary() {
  const section = document.getElementById('aiSummary');
  const container = document.getElementById('aiSummaryContent');

  if (data.tasks.length < 1) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  const totalMinutes = data.tasks.reduce((s, t) => s + t.time, 0);
  const studyMinutes = data.tasks.filter(t => t.project.includes('勉強')).reduce((s, t) => s + t.time, 0);
  const devMinutes = data.tasks.filter(t => t.project.includes('開発')).reduce((s, t) => s + t.time, 0);
  const workMinutes = totalMinutes - studyMinutes;
  const projectTimes = {};
  data.tasks.forEach(t => {
    projectTimes[t.project] = (projectTimes[t.project] || 0) + t.time;
  });
  const projectCount = Object.keys(projectTimes).length;
  const sortedProjects = Object.entries(projectTimes).sort((a, b) => b[1] - a[1]);
  const topProject = sortedProjects[0];
  const topRatio = totalMinutes > 0 ? Math.round(topProject[1] / totalMinutes * 100) : 0;
  const taskCount = data.tasks.length;
  const avgTime = Math.round(totalMinutes / taskCount);

  const isTodayView = viewingDate === todayKey();
  const comments = [];
  const tr = TRANSLATIONS[currentLang];

  // Greeting
  const hour = new Date().getHours();
  let greeting = '';
  if (isTodayView) {
    if (hour < 12) greeting = tr.aiGreetingMorning;
    else if (hour < 18) greeting = tr.aiGreetingAfternoon;
    else greeting = tr.aiGreetingEvening;
  } else {
    greeting = tr.aiGreetingPast;
  }

  // Total time comment
  if (totalMinutes >= 600) {
    comments.push(tr.aiOver10h);
  } else if (totalMinutes >= 480) {
    comments.push(tr.aiOver8h(formatTime(totalMinutes)));
  } else if (totalMinutes >= 300) {
    comments.push(tr.aiOver5h(formatTime(totalMinutes)));
  } else if (totalMinutes >= 120) {
    comments.push(tr.aiOver2h(formatTime(totalMinutes)));
  } else if (totalMinutes > 0) {
    comments.push(tr.aiUnder2h(formatTime(totalMinutes)));
  }

  // Study comment
  if (goals.study && goals.study > 0) {
    if (studyMinutes >= goals.study) {
      comments.push(tr.aiStudyGoalMet(formatTime(goals.study), formatTime(studyMinutes)));
    } else if (studyMinutes > 0) {
      const remaining = goals.study - studyMinutes;
      comments.push(tr.aiStudyPartial(formatTime(studyMinutes), formatTime(remaining)));
    } else {
      comments.push(tr.aiStudyZero);
    }
  } else {
    if (studyMinutes > 0) {
      comments.push(tr.aiStudyNoGoal(formatTime(studyMinutes)));
    } else if (data.projects.some(p => p.includes('勉強'))) {
      comments.push(tr.aiStudySkipped);
    }
  }

  // Dev comment
  if (goals.dev && goals.dev > 0) {
    if (devMinutes >= goals.dev) {
      comments.push(tr.aiDevGoalMet(formatTime(goals.dev)));
    } else if (devMinutes > 0) {
      comments.push(tr.aiDevPartial(formatTime(devMinutes)));
    } else {
      comments.push(tr.aiDevZero);
    }
  } else if (devMinutes > 0) {
    comments.push(tr.aiDevNoGoal(formatTime(devMinutes)));
  }

  // Project balance
  if (projectCount >= 4) {
    comments.push(tr.aiMultiProject(projectCount));
  } else if (projectCount === 1 && totalMinutes >= 180) {
    comments.push(tr.aiFocused(topProject[0]));
  }

  if (projectCount >= 2 && topRatio >= 70) {
    comments.push(tr.aiTopHeavy(topProject[0], topRatio));
  } else if (projectCount >= 3 && topRatio <= 40) {
    comments.push(tr.aiBalanced);
  }

  // Task granularity
  if (avgTime < 15 && taskCount >= 5) {
    comments.push(tr.aiTooGranular);
  } else if (avgTime >= 90 && taskCount >= 2) {
    comments.push(tr.aiLongTasks);
  }

  // Yesterday comparison
  const yesterday = new Date(viewingDate);
  yesterday.setDate(yesterday.getDate() - 1);
  const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  const yData = getDayData(yKey);
  const yTotal = yData.tasks.reduce((s, task) => s + task.time, 0);
  if (yTotal > 0) {
    const diff = totalMinutes - yTotal;
    if (diff > 60) {
      comments.push(tr.aiMoreThanYesterday(formatTime(diff)));
    } else if (diff < -60) {
      comments.push(tr.aiLessThanYesterday(formatTime(Math.abs(diff))));
    } else {
      comments.push(tr.aiSameAsYesterday);
    }
  }

  // Productivity score
  let score = 50;
  if (totalMinutes >= 300) score += 10;
  if (totalMinutes >= 480) score += 10;
  if (studyMinutes > 0) score += 10;
  if (devMinutes > 0) score += 5;
  if (goals.study && studyMinutes >= goals.study) score += 10;
  if (goals.dev && devMinutes >= goals.dev) score += 10;
  if (projectCount >= 3) score += 5;
  if (avgTime < 10 && taskCount >= 5) score -= 10;
  if (totalMinutes >= 600) score -= 5;
  score = Math.min(100, Math.max(0, score));

  let scoreLabel = '';
  if (score >= 90) scoreLabel = tr.aiScoreBest;
  else if (score >= 75) scoreLabel = tr.aiScoreGreat;
  else if (score >= 60) scoreLabel = tr.aiScoreGood;
  else if (score >= 40) scoreLabel = tr.aiScoreOk;
  else scoreLabel = tr.aiScoreRelax;

  let html = `<div class="ai-greeting">${greeting}</div>`;
  comments.forEach(c => {
    html += `<div class="ai-comment">${c}</div>`;
  });
  html += `<div style="margin-top:14px;"><span class="ai-score">${tr.aiScoreFormat(scoreLabel, score)}</span></div>`;

  container.innerHTML = html;
}

function renderWeeklyReport() {
  const section = document.getElementById('weeklyReport');
  if (!isToday()) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  const container = document.getElementById('weeklyReportContent');
  const today = todayKey();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    days.push(addDays(today, -i));
  }

  const dayTotals = days.map(d => ({ key: d, minutes: getDayTotalMinutes(d) }));
  const maxMinutes = Math.max(...dayTotals.map(d => d.minutes), 1);
  const totalWeekMinutes = dayTotals.reduce((s, d) => s + d.minutes, 0);
  const daysWithData = dayTotals.filter(d => d.minutes > 0).length;
  const avgMinutes = daysWithData > 0 ? Math.round(totalWeekMinutes / daysWithData) : 0;

  const weekdayNames = t('weekdayNames');

  let html = '';
  dayTotals.forEach(d => {
    const date = dateKeyToDate(d.key);
    const dayLabel = `${date.getMonth()+1}/${date.getDate()}(${weekdayNames[date.getDay()]})`;
    const pct = maxMinutes > 0 ? (d.minutes / maxMinutes * 100) : 0;
    const isCurrentDay = d.key === today;
    html += `<div class="weekly-bar-row${isCurrentDay ? ' today' : ''}">`;
    html += `<span class="weekly-bar-label">${dayLabel}</span>`;
    html += `<div class="weekly-bar-bg"><div class="weekly-bar-fill" style="width:${pct}%"></div></div>`;
    html += `<span class="weekly-bar-value">${d.minutes > 0 ? formatTime(d.minutes) : '-'}</span>`;
    html += '</div>';
  });

  html += '<div class="weekly-summary">';
  html += '<div class="weekly-summary-item">';
  html += `<div class="weekly-summary-label">${t('weeklyTotal')}</div>`;
  html += `<div class="weekly-summary-value">${formatTime(totalWeekMinutes)}</div>`;
  html += '</div>';
  html += '<div class="weekly-summary-item">';
  html += `<div class="weekly-summary-label">${t('weeklyAvg')}</div>`;
  html += `<div class="weekly-summary-value">${avgMinutes > 0 ? formatTime(avgMinutes) : '-'}</div>`;
  html += '</div>';
  html += '</div>';

  // Project breakdown for the week
  const projectWeekTotals = {};
  days.forEach(d => {
    const dayData = allData.days[d];
    if (!dayData || !dayData.tasks) return;
    dayData.tasks.forEach(task => {
      projectWeekTotals[task.project] = (projectWeekTotals[task.project] || 0) + task.time;
    });
  });

  const sortedProjects = Object.entries(projectWeekTotals).sort((a, b) => b[1] - a[1]);
  if (sortedProjects.length > 0) {
    const maxProjectMin = sortedProjects[0][1];
    html += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid #ececf5;">`;
    html += `<div style="font-size:0.8rem;color:#999;margin-bottom:10px;">${currentLang === 'ja' ? 'プロジェクト別' : 'By Project'}</div>`;
    sortedProjects.forEach(([project, minutes]) => {
      const pct = maxProjectMin > 0 ? (minutes / maxProjectMin * 100) : 0;
      const color = getProjectColor(project);
      html += `<div class="weekly-bar-row">`;
      html += `<span class="weekly-bar-label" style="font-size:0.75rem;">${escapeHtml(project)}</span>`;
      html += `<div class="weekly-bar-bg"><div class="weekly-bar-fill" style="width:${pct}%;background:${color};"></div></div>`;
      html += `<span class="weekly-bar-value">${formatTime(minutes)}</span>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

function render() {
  // Date display
  const dateDisplay = document.getElementById('dateDisplay');
  const d = dateKeyToDate(viewingDate);
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  dateDisplay.textContent = d.toLocaleDateString(t('dateLocale'), options);

  // Date nav label
  document.getElementById('navDateLabel').textContent = formatDateKey(viewingDate);
  document.getElementById('nextDay').disabled = isToday();
  document.getElementById('todayBtn').style.display = isToday() ? 'none' : 'inline-block';

  // Banner for past dates
  const banner = document.getElementById('readonlyBanner');
  const inputArea = document.getElementById('inputArea');
  if (!isToday()) {
    banner.innerHTML = `<div class="readonly-banner" style="background:#f0f4fe;border-color:#d0ddfe;">${currentLang === 'ja' ? '過去の記録を編集中' : 'Editing past records'}</div>`;
  } else {
    banner.innerHTML = '';
  }
  inputArea.style.display = 'block';

  // Project select
  const container = document.getElementById('taskProjectContainer');
  const currentVal = getCustomSelectValue('taskProjectContainer');
  const preserveVal = (currentVal && data.projects.includes(currentVal)) ? currentVal : '';
  container.dataset.value = preserveVal;
  createCustomSelect('taskProjectContainer', data.projects, t('selectDefault'));

  // Summary
  const totalMinutes = data.tasks.reduce((s, t) => s + t.time, 0);
  const studyMinutes = data.tasks
    .filter(t => t.project.includes('勉強'))
    .reduce((s, t) => s + t.time, 0);
  const workMinutes = totalMinutes - studyMinutes;
  const devMinutes = data.tasks
    .filter(t => t.project.includes('開発'))
    .reduce((s, t) => s + t.time, 0);

  document.getElementById('totalTime').textContent = formatTime(workMinutes);
  document.getElementById('devTime').textContent = formatTime(devMinutes);
  document.getElementById('studyTime').textContent = formatTime(studyMinutes);

  // Goal progress bars
  renderGoalBar('study', studyMinutes);
  renderGoalBar('dev', devMinutes);

  // Task display grouped by project
  const display = document.getElementById('taskDisplay');
  if (data.tasks.length === 0) {
    display.innerHTML = `<div class="empty">${t('emptyTasks')}</div>`;
  } else {
    const grouped = {};
    data.tasks.forEach(t => {
      if (!grouped[t.project]) grouped[t.project] = [];
      grouped[t.project].push(t);
    });

    let html = '';
    Object.entries(grouped).forEach(([project, tasks]) => {
      const color = getProjectColor(project);
      const projectTotal = tasks.reduce((s, t) => s + t.time, 0);

      html += `<div class="project-group">`;
      html += `<div class="project-header" style="background:${color}" onclick="openColorPicker('${escapeHtml(project)}')" title="${t('colorClickHint')}">`;
      html += `<span>${project}</span>`;
      html += `<span class="project-time">${formatTime(projectTotal)} / ${tasks.length}${t('taskCount')}</span>`;
      html += `</div>`;
      html += `<div class="task-list">`;
      tasks.forEach(t => {
        html += `<div class="task-item">`;
        html += `<span class="task-name editable" onclick="editTaskName(${t.id})" title="${TRANSLATIONS[currentLang].editClickHint}">${escapeHtml(t.name)}</span>`;
        html += `<span class="task-time editable" onclick="editTaskTime(${t.id})" title="${TRANSLATIONS[currentLang].editClickHint}">${formatTime(t.time)}</span>`;
        html += `<button class="btn-delete" onclick="deleteTask(${t.id})">×</button>`;
        html += `</div>`;
      });
      html += `</div></div>`;
    });
    display.innerHTML = html;
  }

  // Update timer project list if idle and viewing today
  if (timerState === 'idle' && isToday()) renderTimer();

  // Donut Chart
  const timelineSection = document.getElementById('timelineSection');
  if (data.tasks.length > 0) {
    timelineSection.style.display = 'block';
    const chart = document.getElementById('donutChart');
    const projectTimes = {};
    data.tasks.forEach(t => {
      projectTimes[t.project] = (projectTimes[t.project] || 0) + t.time;
    });

    const size = 180;
    const stroke = 32;
    const radius = (size - stroke) / 2;
    const circumference = 2 * Math.PI * radius;
    let offset = 0;

    let arcs = '';
    const entries = Object.entries(projectTimes);
    entries.forEach(([project, time]) => {
      const color = getProjectColor(project);
      const pct = time / totalMinutes;
      const dashLen = circumference * pct;
      const dashGap = circumference - dashLen;
      arcs += `<circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dashLen} ${dashGap}" stroke-dashoffset="${-offset}" stroke-linecap="round" style="transition:all 0.4s ease"/>`;
      offset += dashLen;
    });

    let legendHtml = '';
    entries.forEach(([project, time]) => {
      const color = getProjectColor(project);
      const pct = Math.round(time / totalMinutes * 100);
      legendHtml += `<div class="donut-legend-item">`;
      legendHtml += `<div class="donut-legend-dot" style="background:${color}"></div>`;
      legendHtml += `<div class="donut-legend-info">`;
      legendHtml += `<span class="donut-legend-name">${project}</span>`;
      legendHtml += `<span class="donut-legend-detail">${formatTime(time)}（${pct}%）</span>`;
      legendHtml += `</div></div>`;
    });

    chart.innerHTML = `
      <div class="donut-chart" style="width:${size}px;height:${size}px;">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
          <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="#f0f0f5" stroke-width="${stroke}"/>
          ${arcs}
        </svg>
        <div class="donut-center">
          <div class="donut-total-label">${t('donutTotalLabel')}</div>
          <div class="donut-total-value">${formatTime(totalMinutes)}</div>
        </div>
      </div>
      <div class="donut-legend">${legendHtml}</div>`;
  } else {
    timelineSection.style.display = 'none';
  }

  // Advice
  const adviceSection = document.getElementById('adviceSection');
  const advices = generateAdvice();
  if (advices.length > 0) {
    adviceSection.style.display = 'block';
    document.getElementById('adviceList').innerHTML = advices.map(a =>
      `<div class="advice-card ${a.type}"><span class="advice-icon">${a.icon}</span><span>${a.text}</span></div>`
    ).join('');
  } else {
    adviceSection.style.display = data.tasks.length > 0 ? 'block' : 'none';
    document.getElementById('adviceList').innerHTML = `<div class="advice-card good"><span class="advice-icon">👍</span><span>${t('adviceAddMore')}</span></div>`;
  }

  // Weekly report
  renderWeeklyReport();

  // AI Summary
  renderAiSummary();
}

function renderGoalBar(type, currentMinutes) {
  const barContainer = document.getElementById(type + 'GoalBar');
  const label = document.getElementById(type + 'GoalLabel');
  const fill = document.getElementById(type + 'GoalFill');
  const goal = goals[type];

  if (!goal || goal <= 0) {
    barContainer.style.display = 'none';
    return;
  }

  barContainer.style.display = 'block';
  const pct = Math.min(100, Math.round(currentMinutes / goal * 100));
  label.textContent = `${t('goalOf')} ${formatTime(goal)} (${pct}%)`;
  fill.style.width = pct + '%';
}

function editTaskName(id) {
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  const span = event.target;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = task.name;
  input.className = 'edit-input';
  input.style.flex = '1';
  span.replaceWith(input);
  input.focus();
  input.select();

  const save = () => {
    const val = input.value.trim();
    if (val) task.name = val;
    saveData();
    render();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) save();
    if (e.key === 'Escape') render();
  });
}

function editTaskTime(id) {
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  const span = event.target;
  const input = document.createElement('input');
  input.type = 'number';
  input.value = task.time;
  input.min = '1';
  input.className = 'edit-input time';
  span.replaceWith(input);
  input.focus();
  input.select();

  const save = () => {
    const val = parseInt(input.value);
    if (val && val > 0) task.time = val;
    saveData();
    render();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') render();
  });
}

const PALETTE = [
  '#c4b8e0','#b8d4c4','#d4b8c4','#b8c8d4','#d4ccb8',
  '#b8d4d4','#d4b8b8','#c4d4b8','#a89cc8','#8bb5a0',
  '#c89cac','#8ba8c8','#c8b88b','#8bc8c8','#c88b8b',
  '#a0c88b','#e6c9a8','#a8c9e6','#e6a8c9','#c9e6a8'
];

let currentEditProject = '';

function openColorPicker(project) {
  if (!data.projectColors) data.projectColors = {};
  currentEditProject = project;
  const current = getProjectColor(project);

  let html = '<div class="color-overlay" onclick="if(event.target===this)closeColorPicker()">';
  html += '<div class="color-modal">';
  html += `<div class="color-modal-title">${escapeHtml(project)}${t('colorPickerTitle')}</div>`;
  html += '<div class="project-name-edit">';
  html += `<label>${t('labelProjectName')}</label>`;
  html += `<div class="project-name-row"><input type="text" id="editProjectName" value="${escapeHtml(project)}" class="edit-input" style="flex:1;"><button class="btn-add" onclick="renameProject()">${t('btnChange')}</button></div>`;
  html += '</div>';
  html += '<div class="color-grid">';
  PALETTE.forEach(c => {
    const sel = c === current ? ' selected' : '';
    html += `<div class="color-swatch${sel}" style="background:${c}" onclick="selectColor('${currentEditProject}','${c}')"></div>`;
  });
  html += '</div>';
  html += '<div class="color-custom">';
  html += `<input type="color" id="customColor" value="${current}" onchange="selectColor(currentEditProject,this.value)">`;
  html += `<span>${t('customColor')}</span>`;
  html += '</div>';
  html += '<div class="color-modal-buttons">';
  html += `<button class="btn-cancel" onclick="closeColorPicker()">${t('btnClose')}</button>`;
  html += '</div></div></div>';

  document.getElementById('colorPickerContainer').innerHTML = html;
}

function renameProject() {
  const input = document.getElementById('editProjectName');
  const newName = input.value.trim();
  if (!newName) return;
  if (newName === currentEditProject) return;
  if (data.projects.includes(newName)) {
    alert(t('alertProjectNameExists'));
    return;
  }
  const idx = data.projects.indexOf(currentEditProject);
  if (idx !== -1) data.projects[idx] = newName;
  data.tasks.forEach(t => {
    if (t.project === currentEditProject) t.project = newName;
  });
  if (data.projectColors && data.projectColors[currentEditProject]) {
    data.projectColors[newName] = data.projectColors[currentEditProject];
    delete data.projectColors[currentEditProject];
  }
  currentEditProject = newName;
  saveData();
  closeColorPicker();
  render();
}

function selectColor(project, color) {
  if (!data.projectColors) data.projectColors = {};
  data.projectColors[project] = color;
  saveData();
  closeColorPicker();
  render();
}

function closeColorPicker() {
  document.getElementById('colorPickerContainer').innerHTML = '';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function createCustomSelect(containerId, options, placeholder, onChange) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const currentValue = container.dataset.value || '';

  let html = '<div class="custom-select" id="' + containerId + '_select">';
  const isPlaceholder = !currentValue;
  const displayText = currentValue || placeholder;
  html += '<div class="custom-select-trigger' + (isPlaceholder ? ' placeholder' : '') + '">' + escapeHtml(displayText) + '</div>';
  html += '<div class="custom-select-options">';
  html += '<div class="custom-select-option" data-value=""><span>' + escapeHtml(placeholder) + '</span></div>';
  options.forEach(function(opt) {
    const sel = opt === currentValue ? ' selected' : '';
    html += '<div class="custom-select-option' + sel + '" data-value="' + escapeHtml(opt) + '">';
    html += '<span>' + escapeHtml(opt) + '</span>';
    html += '<span class="option-actions">';
    html += '<button class="option-btn edit" data-project="' + escapeHtml(opt) + '" title="編集">✎</button>';
    html += '<button class="option-btn delete" data-project="' + escapeHtml(opt) + '" title="削除">×</button>';
    html += '</span>';
    html += '</div>';
  });
  html += '</div></div>';

  container.innerHTML = html;

  const selectEl = document.getElementById(containerId + '_select');
  const trigger = selectEl.querySelector('.custom-select-trigger');
  const optionsEl = selectEl.querySelector('.custom-select-options');

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    // Close all other open custom selects
    document.querySelectorAll('.custom-select.open').forEach(function(el) {
      if (el !== selectEl) {
        el.classList.remove('open');
        el.querySelector('.custom-select-options').classList.remove('open');
      }
    });
    selectEl.classList.toggle('open');
    optionsEl.classList.toggle('open');
  });

  optionsEl.querySelectorAll('.custom-select-option').forEach(function(optionEl) {
    optionEl.addEventListener('click', function(e) {
      e.stopPropagation();
      const value = this.dataset.value;
      container.dataset.value = value;
      trigger.textContent = value || placeholder;
      if (value) {
        trigger.classList.remove('placeholder');
      } else {
        trigger.classList.add('placeholder');
      }
      // Update selected state
      optionsEl.querySelectorAll('.custom-select-option').forEach(function(o) { o.classList.remove('selected'); });
      this.classList.add('selected');
      // Close dropdown
      selectEl.classList.remove('open');
      optionsEl.classList.remove('open');
      if (onChange) onChange(value);
    });
  });

  // Edit buttons
  optionsEl.querySelectorAll('.option-btn.edit').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      selectEl.classList.remove('open');
      optionsEl.classList.remove('open');
      const oldName = this.dataset.project;
      const newName = prompt(currentLang === 'ja' ? 'プロジェクト名を変更:' : 'Rename project:', oldName);
      if (newName && newName.trim() && newName.trim() !== oldName) {
        renameProjectFromSelect(oldName, newName.trim());
      }
    });
  });

  // Delete buttons
  optionsEl.querySelectorAll('.option-btn.delete').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      selectEl.classList.remove('open');
      optionsEl.classList.remove('open');
      const name = this.dataset.project;
      const msg = currentLang === 'ja' ? '「' + name + '」を削除しますか？\nこのプロジェクトのタスクも削除されます。' : 'Delete "' + name + '"?\nAll tasks in this project will also be deleted.';
      if (confirm(msg)) {
        deleteProjectFromSelect(name);
      }
    });
  });
}

function renameProjectFromSelect(oldName, newName) {
  if (data.projects.includes(newName)) {
    alert(currentLang === 'ja' ? 'このプロジェクト名は既に存在します。' : 'This project name already exists.');
    return;
  }
  const idx = data.projects.indexOf(oldName);
  if (idx !== -1) data.projects[idx] = newName;
  data.tasks.forEach(t => { if (t.project === oldName) t.project = newName; });
  if (data.projectColors && data.projectColors[oldName]) {
    data.projectColors[newName] = data.projectColors[oldName];
    delete data.projectColors[oldName];
  }
  saveData();
  render();
}

function deleteProjectFromSelect(name) {
  data.projects = data.projects.filter(p => p !== name);
  data.tasks = data.tasks.filter(t => t.project !== name);
  if (data.projectColors) delete data.projectColors[name];
  saveData();
  render();
}

function setCustomSelectValue(containerId, value) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.dataset.value = value;
  const trigger = container.querySelector('.custom-select-trigger');
  if (trigger) {
    const placeholder = container.querySelector('.custom-select-option:first-child');
    trigger.textContent = value || (placeholder ? placeholder.textContent : '');
    if (value) {
      trigger.classList.remove('placeholder');
    } else {
      trigger.classList.add('placeholder');
    }
  }
  // Update selected class
  const options = container.querySelectorAll('.custom-select-option');
  options.forEach(function(o) {
    o.classList.toggle('selected', o.dataset.value === value);
  });
}

function getCustomSelectValue(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return '';
  return container.dataset.value || '';
}

// Close all custom selects when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.custom-select')) {
    document.querySelectorAll('.custom-select.open').forEach(function(el) {
      el.classList.remove('open');
      el.querySelector('.custom-select-options').classList.remove('open');
    });
  }
});

// Close custom selects on touch outside (mobile)
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('.custom-select')) {
    document.querySelectorAll('.custom-select.open').forEach(function(el) {
      el.classList.remove('open');
      el.querySelector('.custom-select-options').classList.remove('open');
    });
  }
}, { passive: true });

// Enter key support (deferred until DOM is ready in app)
function setupKeyListeners() {
  document.getElementById('newProject').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) addProject(); });
  document.getElementById('taskName').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) addTask(); });
  document.getElementById('taskHours').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) addTask(); });
  document.getElementById('taskMinutes').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) addTask(); });
}

// Setup key listeners once app content is visible
const keyListenerObserver = new MutationObserver(() => {
  if (document.getElementById('appContent').style.display !== 'none') {
    setupKeyListeners();
    keyListenerObserver.disconnect();
  }
});
keyListenerObserver.observe(document.getElementById('appContent'), { attributes: true, attributeFilter: ['style'] });

// Show login screen immediately (auth state listener will handle the rest)
document.getElementById('loginScreen').style.display = 'flex';

// Set initial language
updateLangToggleButtons();
document.documentElement.lang = currentLang === 'ja' ? 'ja' : 'en';
updateStaticText();
</script>
